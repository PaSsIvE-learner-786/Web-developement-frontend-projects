<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@100..900&family=Nunito+Sans:opsz,wdth,wght@6..12,105,200&display=swap"
    rel="stylesheet">
  <!-- Basic Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  <!-- Filled Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
  <!-- Brand Icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
  <title>Card</title>
</head>

<body>
  <div class="card">
    <div class="card-header">
      <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
    </div>

    <div class="card-body">
      <div class="details">
        <p class="name">MD Aasim Ali</p>
        <p class="title">Software Engineer</p>
      </div>

      <div class="social-media">
        
        <a href="https://www.facebook.com/mdaasim.ali.963" aria-label="Facebook" class="link" style="background-color: rgb(70, 65, 144);">
          <i class="bxl bx-facebook"></i> 
        </a>
      
        <a href="https://www.instagram.com/a.a.s.i.m._56/" aria-label="Instagram" class="link" style="background-color: rgb(215, 74, 74);">
          <i class="bxl bx-instagram"></i> 
        </a>
      
        <a href="https://www.linkedin.com/in/aasim-ali-b0b450361/" aria-label="LinkedIn" class="link" style="background-color: rgb(100, 90, 234);">
          <i class="bxl bx-linkedin"></i> 
        </a>
      
        <a href="https://x.com/AasimAli893094" aria-label="Twitter" class="link" style="background-color: rgb(76, 163, 216);">
          <i class="bxl bx-twitter"></i> 
        </a>
        
      </div>
      
      <div class="btns">
        <button>Subscribe</button>
        <button>Message</button>
      </div>
      
      <div class="interaction">
        <div class="data">
          <i class="bxrd bx-heart" ></i>
          <span>60 K</span>
        </div>
        <div class="data">
          <i class="bxr bx-message-circle" ></i>
          <span>30 K</span>
        </div>
        <div class="data" style="border: none;">
          <i class="bxr bx-share" ></i>
          <span>12 K</span>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
